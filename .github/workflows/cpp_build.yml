name: C++ build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
  release:
    types:
      - published

jobs:
  test_cpp:
    name: Test C++ code on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-15-intel, macos-14]

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: false

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DZONOOPT_BUILD_TESTING=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Run tests
        working-directory: build
        run: ctest -C Release --output-on-failure --no-tests=error